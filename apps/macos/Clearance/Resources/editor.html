<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'none'; script-src 'self' 'unsafe-inline' file:; style-src 'self' 'unsafe-inline' file:; img-src data: file:;"
  />
  <link rel="stylesheet" href="codemirror.min.css" />
  <script src="codemirror.min.js"></script>
  <script src="xml.min.js"></script>
  <script src="meta.min.js"></script>
  <script src="markdown.min.js"></script>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background: #f6f6f8;
    }

    .CodeMirror {
      height: 100vh;
      font-size: 14px;
      line-height: 1.6;
      font-family: "SF Mono", Menlo, Monaco, monospace;
      background: #ffffff;
      color: #1f1f24;
    }

    .CodeMirror-gutters {
      background: #f4f4f6;
      border-right: 1px solid #e4e4e8;
    }
  </style>
</head>
<body>
  <textarea id="editor"></textarea>
  <script>
    const editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
      mode: 'markdown',
      lineNumbers: true,
      lineWrapping: true,
      undoDepth: 10000
    });

    window.setContent = function(value) {
      if (editor.getValue() !== value) {
        editor.setValue(value);
      }
    };

    editor.on('change', function() {
      if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.textDidChange) {
        window.webkit.messageHandlers.textDidChange.postMessage(editor.getValue());
      }
    });
  </script>
</body>
</html>
